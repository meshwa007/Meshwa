<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard | Meshwa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Internal CSS -->
    <style>
        body {
            background: linear-gradient(to right, #ffe6f0, #f8f9fa);
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #ff4da6 !important;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 20px;
        }

        h2 {
            color: #333;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #ff4da6;
            border: none;
        }

        .btn-primary:hover {
            background-color: #e60073;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card-body h5 {
            color: #ff4da6;
            font-weight: bold;
        }

        footer {
            background-color: #ff4da6;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">Meshwa Prajapati</span>
</nav>

<!-- Header -->
<div class="container text-center mt-4">
    <h2>Employee Management System</h2>
    <p class="text-muted">Professional Dashboard UI using Bootstrap</p>
</div>

<!-- Button -->
<div class="container text-end mb-3">
    <button class="btn btn-primary">+ Add Employee</button>
</div>

<!-- Cards -->
<div class="container">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Rahul Sharma</h5>
                    <p>ID: 101</p>
                    <p>Role: Developer</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Priya Patel</h5>
                    <p>ID: 102</p>
                    <p>Role: Designer</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Amit Verma</h5>
                    <p>ID: 103</p>
                    <p>Role: Manager</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="text-white text-center p-3 mt-5">
    © 2026 Meshwa Prajapati | GitHub Project
</footer>

</body>
</html>
